<!-- Sidebar compartilhada — incluida em index.html e varejo.html.
     'active' (str) define o item destacado: import | painel | varejo.
     Em "/" os itens import/painel sao interceptados por JS (troca de view);
     em "/varejo" eles sao links normais que voltam para "/". -->
<aside class="sidebar no-print">
  <div class="sb-brand">
    <div class="sb-logo">N1</div>
    <div class="sb-brand-txt">
      <strong>Eixo N1</strong>
      <span>Pedido Completo</span>
    </div>
  </div>

  <nav class="sb-nav">
    <a class="sb-item{% if active == 'import' %} active{% endif %}"
       href="/#import" data-view="import">
      <span class="sb-ic">📥</span><span class="sb-lbl">Importar arquivos</span>
    </a>
    <a class="sb-item{% if active == 'painel' %} active{% endif %}"
       href="/#painel" data-view="painel">
      <span class="sb-ic">🧮</span><span class="sb-lbl">Gerador Pedido Completo</span>
    </a>
    <a class="sb-item{% if active == 'priorizar' %} active{% endif %}"
       href="/priorizar">
      <span class="sb-ic">⭐</span><span class="sb-lbl">Priorizar Pedidos</span>
    </a>
    <a class="sb-item{% if active == 'varejo' %} active{% endif %}"
       href="/varejo/">
      <span class="sb-ic">🏪</span><span class="sb-lbl">Tabela Varejo</span>
    </a>
  </nav>

  <div class="sb-foot">N1 Alimentos S/A · <strong>build v5</strong></div>
</aside>
